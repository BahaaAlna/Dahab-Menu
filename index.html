<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دهب | شاورما و جريل</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Aref+Ruqaa:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--gold:#d4a849;--gold-light:#f4d97a;--gold-deep:#a67c2e;--black:#0f0f0f;--char:#1a1a1a;--cream:#f5f0e6;}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Cairo',sans-serif;background:var(--black);color:var(--cream);overflow-x:hidden;position:relative;}
body::before{content:"";position:fixed;inset:0;background:radial-gradient(circle at 20% 15%, rgba(212,168,73,0.08), transparent 35%),radial-gradient(circle at 80% 85%, rgba(212,168,73,0.06), transparent 40%),var(--black);z-index:-2;}
body::after{content:"";position:fixed;inset:0;background-image:repeating-linear-gradient(45deg, rgba(212,168,73,0.015) 0 2px, transparent 2px 28px),repeating-linear-gradient(-45deg, rgba(212,168,73,0.015) 0 2px, transparent 2px 28px);z-index:-1;pointer-events:none;}

/* HERO */
.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 20px;position:relative;}
.hero-frame{border:2px solid var(--gold);border-radius:24px;padding:50px 40px 40px;max-width:600px;width:100%;position:relative;background:linear-gradient(160deg, rgba(212,168,73,0.05), rgba(0,0,0,0.2));box-shadow:0 0 60px rgba(212,168,73,0.12), inset 0 0 40px rgba(0,0,0,0.4);animation:fadeUp 1s ease both;}
.hero-frame::before{content:"";position:absolute;inset:10px;border:1px solid rgba(212,168,73,0.35);border-radius:16px;pointer-events:none;}
.corner{position:absolute;width:26px;height:26px;border:2px solid var(--gold);}
.corner.tl{top:-2px;right:-2px;border-left:none;border-bottom:none;border-radius:0 24px 0 0;}
.corner.tr{top:-2px;left:-2px;border-right:none;border-bottom:none;border-radius:24px 0 0 0;}
.corner.bl{bottom:-2px;right:-2px;border-left:none;border-top:none;border-radius:0 0 24px 0;}
.corner.br{bottom:-2px;left:-2px;border-right:none;border-top:none;border-radius:0 0 0 24px;}
.hero-logo{width:min(360px,75%);height:auto;filter:drop-shadow(0 6px 20px rgba(0,0,0,0.5));animation:fadeUp 1.1s 0.15s ease both;}
.hero-tag{margin-top:20px;font-family:'Aref Ruqaa',serif;font-size:1.5rem;color:var(--gold-light);letter-spacing:1px;animation:fadeUp 1.1s 0.3s ease both;}
.hero-divider{display:flex;align-items:center;justify-content:center;gap:14px;margin:26px auto 0;animation:fadeUp 1.1s 0.45s ease both;}
.hero-divider span{height:1px;width:60px;background:linear-gradient(90deg,transparent,var(--gold));}
.hero-divider span:last-child{background:linear-gradient(90deg,var(--gold),transparent);}
.hero-divider i{width:8px;height:8px;background:var(--gold);transform:rotate(45deg);display:block;}
.scroll-hint{margin-top:40px;font-size:0.9rem;color:var(--gold);letter-spacing:2px;animation:bounce 2s infinite;}

/* MENU */
.menu-wrap{max-width:760px;margin:0 auto;padding:30px 18px 60px;}
.section{margin:46px 0;animation:fadeUp 0.8s ease both;}
.section-head{display:flex;align-items:center;gap:16px;margin-bottom:26px;}
.section-head .line{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(212,168,73,0.5));}
.section-head .line:last-child{background:linear-gradient(90deg,rgba(212,168,73,0.5),transparent);}
.section-title{font-family:'Aref Ruqaa',serif;font-size:2rem;color:var(--gold);white-space:nowrap;text-shadow:0 2px 10px rgba(212,168,73,0.25);}
.section-icon{font-size:1.4rem;}
.items{background:linear-gradient(160deg,rgba(255,255,255,0.03),rgba(255,255,255,0.01));border:1px solid rgba(212,168,73,0.2);border-radius:16px;padding:8px 22px;backdrop-filter:blur(2px);}
.item{display:flex;align-items:baseline;gap:12px;padding:14px 0;border-bottom:1px dashed rgba(212,168,73,0.18);}
.item.unavailable{opacity:0.4;}
.item.unavailable .item-name::after{content:" (غير متوفر)";color:#f87171;font-size:0.85em;}
.item:last-child{border-bottom:none;}
.item-name{font-weight:600;font-size:1.08rem;color:var(--cream);white-space:nowrap;}
.item-dots{flex:1;border-bottom:1px dotted rgba(212,168,73,0.35);transform:translateY(-4px);}
.item-price{font-weight:700;font-size:1.05rem;color:var(--gold-light);white-space:nowrap;}
.item-price small{font-size:0.7rem;color:var(--gold-deep);margin-right:3px;}

/* Loading state */
.loading{text-align:center;padding:60px 20px;color:var(--gold);}
.spinner{display:inline-block;width:40px;height:40px;border:3px solid rgba(212,168,73,0.2);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* CONTACT */
.contact{max-width:760px;margin:0 auto;padding:50px 18px 70px;text-align:center;}
.contact-frame{border:2px solid var(--gold);border-radius:24px;padding:40px 30px;background:linear-gradient(160deg,rgba(212,168,73,0.06),rgba(0,0,0,0.3));position:relative;}
.contact-title{font-family:'Aref Ruqaa',serif;font-size:1.8rem;color:var(--gold);margin-bottom:24px;}
.contact-row{display:flex;align-items:center;justify-content:center;gap:10px;margin:14px 0;font-size:1.1rem;}
.contact-row .ic{width:34px;height:34px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;background:var(--gold);color:var(--black);font-size:1rem;flex-shrink:0;}
.contact-row a{color:var(--cream);text-decoration:none;direction:ltr;font-weight:600;letter-spacing:1px;}
.contact-row a:hover{color:var(--gold-light);}
.contact-loc{color:var(--cream);font-weight:600;}

footer{text-align:center;padding:30px 20px 50px;color:var(--gold-deep);font-size:0.85rem;}
footer .heart{color:var(--gold);}

/* Live update indicator */
.live-badge{position:fixed;top:12px;left:12px;background:rgba(212,168,73,0.15);color:var(--gold);padding:6px 12px;border-radius:20px;font-size:0.75rem;display:flex;align-items:center;gap:6px;border:1px solid rgba(212,168,73,0.3);z-index:100;}
.live-badge .dot{width:8px;height:8px;background:#4ade80;border-radius:50%;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}

@keyframes fadeUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(8px);}}

@media(max-width:520px){
  .section-title{font-size:1.6rem;}
  .item-name{font-size:0.98rem;}
  .item-price{font-size:0.98rem;}
  .hero-frame{padding:40px 22px 30px;}
  .live-badge{font-size:0.7rem;padding:5px 10px;}
}
</style>
</head>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDsgzz_a8THcX8vhcmMcYhuSd-gjbU19jA",
  authDomain: "dahab-menu.firebaseapp.com",
  projectId: "dahab-menu",
  storageBucket: "dahab-menu.firebasestorage.app",
  messagingSenderId: "67793665080",
  appId: "1:67793665080:web:3160688f3e58c2369d3acd"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const menuWrap = document.getElementById("menuWrap");
let sections = [];
let items = [];
let sectionsLoaded = false;
let itemsLoaded = false;

function render() {
  if (!sectionsLoaded || !itemsLoaded) return;

  // Group items by section
  const bySection = {};
  items.forEach(it => {
    if (!bySection[it.sectionId]) bySection[it.sectionId] = [];
    bySection[it.sectionId].push(it);
  });
  // Sort items within each section
  Object.values(bySection).forEach(arr => arr.sort((a,b) => (a.order||0) - (b.order||0)));

  // Sort sections
  const sortedSections = [...sections].sort((a,b) => (a.order||0) - (b.order||0));

  let html = "";
  for (const sec of sortedSections) {
    const secItems = bySection[sec.id] || [];
    if (secItems.length === 0) continue;

    html += `<section class="section">
      <div class="section-head">
        <span class="line"></span>
        <span class="section-icon">${sec.icon || "🍽️"}</span>
        <span class="section-title">${sec.name}</span>
        <span class="section-icon">${sec.icon || "🍽️"}</span>
        <span class="line"></span>
      </div>
      <div class="items">`;

    for (const it of secItems) {
      const cls = it.available === false ? "item unavailable" : "item";
      html += `<div class="${cls}">
        <span class="item-name">${it.name}</span>
        <span class="item-dots"></span>
        <span class="item-price">${it.price}<small>ل.س</small></span>
      </div>`;
    }
    html += `</div></section>`;
  }

  menuWrap.innerHTML = html || '<div class="loading"><p>لا توجد أصناف حالياً</p></div>';
}

// Live listeners — updates appear instantly when admin changes anything
onSnapshot(query(collection(db, "menu_sections"), orderBy("order")), (snap) => {
  sections = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  sectionsLoaded = true;
  render();
}, err => {
  console.error("sections error:", err);
  menuWrap.innerHTML = '<div class="loading" style="color:#f87171;">خطأ في تحميل القائمة. تأكد من الاتصال بالإنترنت.</div>';
});

onSnapshot(collection(db, "menu_items"), (snap) => {
  items = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  itemsLoaded = true;
  render();
}, err => {
  console.error("items error:", err);
});
</script>
</body>
