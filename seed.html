const logEl = document.getElementById("log");
function log(msg, cls=""){
  const line = document.createElement("div");
  line.className = cls;
  line.textContent = msg;
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
}

document.getElementById("uploadBtn").addEventListener("click", async () => {
  const btn = document.getElementById("uploadBtn");
  btn.disabled = true;
  log("🚀 Starting upload...", "info");

  try {
    // 1. Upload sections
    log(`Uploading ${SEED_DATA.sections.length} sections...`, "info");
    const secBatch = writeBatch(db);
    for (const sec of SEED_DATA.sections) {
      const ref = doc(db, "menu_sections", sec.id);
      secBatch.set(ref, sec);
    }
    await secBatch.commit();
    log(`✓ ${SEED_DATA.sections.length} sections uploaded`, "ok");

    // 2. Upload items (in batches of 500 max per Firestore rules)
    log(`Uploading ${SEED_DATA.items.length} items...`, "info");
    const batchSize = 400;
    for (let i = 0; i < SEED_DATA.items.length; i += batchSize) {
      const batch = writeBatch(db);
      const slice = SEED_DATA.items.slice(i, i + batchSize);
      slice.forEach((item, idx) => {
        const id = `${item.sectionId}_${i + idx}`;
        batch.set(doc(db, "menu_items", id), item);
      });
      await batch.commit();
      log(`✓ Batch uploaded (${Math.min(i + batchSize, SEED_DATA.items.length)}/${SEED_DATA.items.length})`, "ok");
    }

    log("🎉 All done! Menu is now live in Firebase.", "ok");
    log("Next: open index.html to see the menu, or admin.html to manage it.", "info");
  } catch (e) {
    log("❌ Error: " + e.message, "err");
    console.error(e);
  }
  btn.disabled = false;
});

document.getElementById("clearBtn").addEventListener("click", async () => {
  if (!confirm("هل أنت متأكد؟ سيتم حذف كل بيانات المنيو من Firebase!")) return;
  const btn = document.getElementById("clearBtn");
  btn.disabled = true;
  log("🗑️ Clearing all data...", "info");
  try {
    for (const coll of ["menu_sections", "menu_items"]) {
      const snap = await getDocs(collection(db, coll));
      const batch = writeBatch(db);
      snap.forEach(d => batch.delete(d.ref));
      await batch.commit();
      log(`✓ Cleared ${snap.size} docs from ${coll}`, "ok");
    }
    log("✅ All data cleared.", "ok");
  } catch (e) {
    log("❌ " + e.message, "err");
  }
  btn.disabled = false;
});

log("Ready. Click the upload button to start.", "info");
